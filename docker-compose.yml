version: "3.9"
services:
  thermostat-dashboard:
    build: .
    container_name: thermostat-dashboard
    restart: unless-stopped
    ports:
      - "3090:3000"
    environment:
      - NEXT_PUBLIC_SIDECAR_URL=http://10.0.0.240:3077
    networks:
      - thermostat-net

networks:
  thermostat-net:
    driver: bridge
